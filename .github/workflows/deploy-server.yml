name: Deploy VitePress site to LibreMesh server

on:
  # Runs on pushes targeting the `main` branch. Change this to `master` if you're
  # using the `master` branch as the default branch.
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1,4"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Not needed if lastUpdated is not enabled
          submodules: 'recursive' # Fetch lime-packages and network-profiles
      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync
      - uses: pnpm/action-setup@v4 # Uncomment this block if you're using pnpm
        with:
          version: 9 # Not needed if you've set "packageManager" in package.json
      # - uses: oven-sh/setup-bun@v1 # Uncomment this if you're using Bun
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm # or pnpm / yarn
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: pnpm install # or pnpm install / yarn install / bun install
      - name: Prebuild with VitePress
        run: pnpm run prebuild # or pnpm docs:build / yarn docs:build / bun run docs:build
      - name: Build with VitePress
        run: pnpm run build:server # or pnpm docs:build / yarn docs:build / bun run docs:build
      
      - name: Upload using rsync
        run: |
          mkdir .ssh/; 
          echo "${{ secrets.RSYNC_PASSWORD }}" > .ssh/id_ed25519;
          chmod 600 .ssh/id_ed25519;
          ssh-keyscan -H "${{ secrets.RSYNC_HOST }}" > .ssh/known_hosts;
          rsync -va --rsh="ssh -i .ssh/id_ed25519 -o UserKnownHostsFile=.ssh/known_hosts"  docs/.vitepress/dist ${{ secrets.RSYNC_USER }}@${{ secrets.RSYNC_HOST }}:/home/${{ secrets.RSYNC_USER }}/site
